<div class="change-password-container">
  <div class="change-password-card card">
    <div class="change-password-logo">
      <span class="mono text-blue">Trade</span><span class="mono text-green">Bot</span>
    </div>
    <h1 class="mono change-password-title">Set a new password</h1>
    <p class="change-password-hint text-muted">
      The first login uses the default admin password. You must change it before continuing.
    </p>

    <form (ngSubmit)="onChangePassword()">
      <div class="form-group">
        <label class="form-label">Current password</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="currentPassword"
          name="currentPassword"
          autocomplete="current-password"
          placeholder="admin123!"
        >
      </div>

      <div class="form-group">
        <label class="form-label">New password</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="newPassword"
          name="newPassword"
          autocomplete="new-password"
          placeholder="Enter a new password"
        >
      </div>

      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          autocomplete="new-password"
          placeholder="Repeat the new password"
        >
      </div>

      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }

      @if (success) {
        <div class="success-msg">{{ success }}</div>
      }

      <button type="submit" class="btn btn-primary" style="width:100%">
        Update password
      </button>
    </form>
  </div>
</div>
