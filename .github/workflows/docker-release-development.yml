name: Docker Release (development)

on:
  push:
    branches: [development]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      manager: ${{ steps.filter.outputs.manager }}
      worker: ${{ steps.filter.outputs.worker }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            manager:
              - 'manager/**'
              - 'services/**'
              - 'shared/**'
              - 'Dockerfile.manager'
              - 'pyproject.toml'
            worker:
              - 'worker/**'
              - 'shared/**'
              - 'Dockerfile.worker'
              - 'pyproject.toml'
            ui:
              - 'ui/**'
              - 'Dockerfile.ui'
              - 'nginx.conf'

  prepare-matrix:
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Build release matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          entries=()

          if [[ "${{ needs.detect-changes.outputs.manager }}" == "true" ]]; then
            entries+=("{\"component\":\"manager\",\"image\":\"manager\",\"dockerfile\":\"Dockerfile.manager\",\"tag_prefix\":\"manager-v\"}")
          fi

          if [[ "${{ needs.detect-changes.outputs.worker }}" == "true" ]]; then
            entries+=("{\"component\":\"worker\",\"image\":\"worker\",\"dockerfile\":\"Dockerfile.worker\",\"tag_prefix\":\"worker-v\"}")
          fi

          if [[ "${{ needs.detect-changes.outputs.ui }}" == "true" ]]; then
            entries+=("{\"component\":\"ui\",\"image\":\"ui\",\"dockerfile\":\"Dockerfile.ui\",\"tag_prefix\":\"ui-v\"}")
          fi

          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          joined=$(IFS=, ; echo "${entries[*]}")
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":[${joined}]}" >> "$GITHUB_OUTPUT"

  docker-release:
    runs-on: ubuntu-latest
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute component development semantic version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          prefix="${{ matrix.tag_prefix }}"
          current_tag=$(git tag --points-at HEAD -l "${prefix}[0-9]*.[0-9]*.[0-9]*-dev" | sort -V | tail -n 1 || true)

          if [[ -n "$current_tag" ]]; then
            version="${current_tag#${prefix}}"
          else
            latest_tag=$(git tag -l "${prefix}[0-9]*.[0-9]*.[0-9]*-dev" | sort -V | tail -n 1 || true)
            if [[ -z "$latest_tag" ]]; then
              latest_tag="${prefix}0.0.0-dev"
              range="HEAD"
            else
              range="${latest_tag}..HEAD"
            fi

            raw="${latest_tag#${prefix}}"
            raw="${raw%-dev}"
            IFS='.' read -r major minor patch <<< "$raw"

            if [[ "$range" == "HEAD" ]]; then
              subjects=$(git log --format='%s' -n 30)
              full_messages=$(git log --format='%s%n%b' -n 30)
            else
              subjects=$(git log --format='%s' "$range")
              full_messages=$(git log --format='%s%n%b' "$range")
            fi

            if echo "$full_messages" | grep -Eq 'BREAKING CHANGE|[a-zA-Z0-9_-]+![:(]'; then
              major=$((major + 1))
              minor=0
              patch=0
            elif echo "$subjects" | grep -Eq '^feat(\(|:|!)'; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi

            version="${major}.${minor}.${patch}-dev"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${prefix}${version}"
            git push origin "${prefix}${version}"
          fi

          raw_version="${version%-dev}"
          IFS='.' read -r major minor patch <<< "$raw_version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=${major}-dev" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}-dev" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push tradebot-${{ matrix.image }} (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ steps.version.outputs.minor }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ steps.version.outputs.major }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:dev
