name: Manual Docker Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Release branch (development or main)'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - main
      components:
        description: 'Components to release (all, manager, worker, ui, or comma-separated list)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  validate-input:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.validate.outputs.branch }}
      release_type: ${{ steps.validate.outputs.release_type }}
    steps:
      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail
          
          BRANCH="${{ github.event.inputs.branch }}"
          
          # Validate branch
          if [[ ! "$BRANCH" =~ ^(development|main)$ ]]; then
            echo "ERROR: Invalid branch. Must be 'development' or 'main'."
            exit 1
          fi
          
          # Determine release type
          if [[ "$BRANCH" == "development" ]]; then
            RELEASE_TYPE="dev"
          else
            RELEASE_TYPE="prod"
          fi
          
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "✓ Validated: branch=$BRANCH, release_type=$RELEASE_TYPE"

  trigger-release:
    runs-on: ubuntu-latest
    needs: validate-input
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute dev component semantic version and tag
        id: version
        shell: bash
        if: needs.validate-input.outputs.branch == 'development'
        run: |
          set -euo pipefail

          git fetch --tags --force

          prefix="${{ matrix.tag_prefix }}"
          current_tag=$(git tag --points-at HEAD -l "${prefix}[0-9]*.[0-9]*.[0-9]*-dev" | sort -V | tail -n 1 || true)

          if [[ -n "$current_tag" ]]; then
            version="${current_tag#${prefix}}"
          else
            latest_tag=$(git tag -l "${prefix}[0-9]*.[0-9]*.[0-9]*-dev" | sort -V | tail -n 1 || true)
            if [[ -z "$latest_tag" ]]; then
              latest_tag="${prefix}0.0.0-dev"
              range="HEAD"
            else
              range="${latest_tag}..HEAD"
            fi

            raw="${latest_tag#${prefix}}"
            raw="${raw%-dev}"
            IFS='.' read -r major minor patch <<< "$raw"

            if [[ "$range" == "HEAD" ]]; then
              subjects=$(git log --format='%s' -n 30)
              full_messages=$(git log --format='%s%n%b' -n 30)
            else
              subjects=$(git log --format='%s' "$range")
              full_messages=$(git log --format='%s%n%b' "$range")
            fi

            if echo "$full_messages" | grep -Eq 'BREAKING CHANGE|[a-zA-Z0-9_-]+![:(]'; then
              major=$((major + 1))
              minor=0
              patch=0
            elif echo "$subjects" | grep -Eq '^feat(\(|:|!)'; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi

            version="${major}.${minor}.${patch}-dev"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${prefix}${version}"
            git push origin "${prefix}${version}"
          fi

          raw_version="${version%-dev}"
          IFS='.' read -r major minor patch <<< "$raw_version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=${major}-dev" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}-dev" >> "$GITHUB_OUTPUT"

      - name: Compute prod component semantic version and tag
        id: version_prod
        shell: bash
        if: needs.validate-input.outputs.branch == 'main'
        run: |
          set -euo pipefail

          git fetch --tags --force

          prefix="${{ matrix.tag_prefix }}"
          current_tag=$(git tag --points-at HEAD -l "${prefix}[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n 1 || true)

          if [[ -n "$current_tag" ]]; then
            version="${current_tag#${prefix}}"
          else
            latest_tag=$(git tag -l "${prefix}[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n 1 || true)
            if [[ -z "$latest_tag" ]]; then
              latest_tag="${prefix}0.0.0"
              range="HEAD"
            else
              range="${latest_tag}..HEAD"
            fi

            raw="${latest_tag#${prefix}}"
            IFS='.' read -r major minor patch <<< "$raw"

            if [[ "$range" == "HEAD" ]]; then
              subjects=$(git log --format='%s' -n 30)
              full_messages=$(git log --format='%s%n%b' -n 30)
            else
              subjects=$(git log --format='%s' "$range")
              full_messages=$(git log --format='%s%n%b' "$range")
            fi

            if echo "$full_messages" | grep -Eq 'BREAKING CHANGE|[a-zA-Z0-9_-]+![:(]'; then
              major=$((major + 1))
              minor=0
              patch=0
            elif echo "$subjects" | grep -Eq '^feat(\(|:|!)'; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi

            version="${major}.${minor}.${patch}"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${prefix}${version}"
            git push origin "${prefix}${version}"
          fi

          IFS='.' read -r major minor patch <<< "$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$major.$minor" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push tradebot-${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ steps.version.outputs.minor }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ steps.version.outputs.major }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:latest
