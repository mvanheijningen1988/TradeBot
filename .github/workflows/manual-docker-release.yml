name: Manual Docker Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Release branch (development or main)'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - main
      components:
        description: 'Components to release (all, manager, worker, ui, or comma-separated list)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  validate-input:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.validate.outputs.branch }}
      release_type: ${{ steps.validate.outputs.release_type }}
    steps:
      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail
          
          BRANCH="${{ github.event.inputs.branch }}"
          
          # Validate branch
          if [[ ! "$BRANCH" =~ ^(development|main)$ ]]; then
            echo "ERROR: Invalid branch. Must be 'development' or 'main'."
            exit 1
          fi
          
          # Determine release type
          if [[ "$BRANCH" == "development" ]]; then
            RELEASE_TYPE="dev"
          else
            RELEASE_TYPE="prod"
          fi
          
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "✓ Validated: branch=$BRANCH, release_type=$RELEASE_TYPE"

  trigger-release:
    runs-on: ubuntu-latest
    needs: validate-input
    steps:
      - name: Trigger development release
        if: needs.validate-input.outputs.branch == 'development'
        run: |
          echo "🚀 Triggering development release workflow..."
          echo "Release type: ${{ needs.validate-input.outputs.release_type }}"
          echo "Components: ${{ github.event.inputs.components }}"

      - name: Trigger main release
        if: needs.validate-input.outputs.branch == 'main'
        run: |
          echo "🚀 Triggering main release workflow..."
          echo "Release type: ${{ needs.validate-input.outputs.release_type }}"
          echo "Components: ${{ github.event.inputs.components }}"

      - name: Workflow summary
        run: |
          cat <<EOF
          
          ═══════════════════════════════════════════════════════
          Manual Docker Release Summary
          ═══════════════════════════════════════════════════════
          Branch:       ${{ needs.validate-input.outputs.branch }}
          Release Type: ${{ needs.validate-input.outputs.release_type }}
          Components:   ${{ github.event.inputs.components || 'all' }}
          
          📖 Next steps:
          - Check the Docker Release (${{ needs.validate-input.outputs.release_type }}) workflow
            for detailed build and push logs.
          - Verify component tags on Docker Hub after completion.
          
          ═══════════════════════════════════════════════════════
          EOF
