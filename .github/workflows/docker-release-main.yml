name: Docker Release (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-and-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          current_tag=$(git tag --points-at HEAD -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)

          if [[ -n "$current_tag" ]]; then
            version="${current_tag#v}"
          else
            latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)
            if [[ -z "$latest_tag" ]]; then
              latest_tag="v0.0.0"
            fi

            raw="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$raw"
            patch=$((patch + 1))
            version="${major}.${minor}.${patch}"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "v${version}"
            git push origin "v${version}"
          fi

          IFS='.' read -r major minor patch <<< "$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$major.$minor" >> "$GITHUB_OUTPUT"

  docker-release:
    runs-on: ubuntu-latest
    needs: version-and-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: manager
            dockerfile: Dockerfile.manager
          - image: worker
            dockerfile: Dockerfile.worker
          - image: ui
            dockerfile: Dockerfile.ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push tradebot-${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ needs.version-and-tag.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ needs.version-and-tag.outputs.minor }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:${{ needs.version-and-tag.outputs.major }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tradebot-${{ matrix.image }}:latest
